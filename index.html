<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная - Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#0088cc', card: '#1e293b', cardHover: '#334155' } } }
        }
    </script>
    <style>
        body { padding-bottom: 80px; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .chart-container { position: relative; height: 180px; width: 180px; margin: 0 auto; }
        .btn-scale:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <header class="p-5 pt-8">
        <div class="text-center">
            <p class="text-slate-400 text-sm mb-2">Общий баланс</p>
            <h1 id="balance-display" class="text-5xl font-bold text-white">0.00</h1>
        </div>
    </header>

    <section class="px-5 py-3">
        <div class="bg-card rounded-2xl p-5 shadow-xl">
            <div class="chart-container"><canvas id="financeChart"></canvas></div>
        </div>
    </section>

    <section class="px-5 py-6 flex-1 flex items-center justify-center">
        <div class="flex gap-4 w-full max-w-sm">
            <button onclick="addTransaction('income')" class="btn-scale flex-1 bg-gradient-to-br from-emerald-600 to-emerald-700 rounded-2xl p-5 shadow-lg"><span class="font-bold text-lg">+ Доход</span></button>
            <button onclick="addTransaction('expense')" class="btn-scale flex-1 bg-gradient-to-br from-rose-600 to-rose-700 rounded-2xl p-5 shadow-lg"><span class="font-bold text-lg">- Расход</span></button>
        </div>
    </section>

    <!-- Нижнее меню -->
    <nav class="fixed bottom-0 w-full bg-card border-t border-slate-700 pb-safe z-40">
        <div class="flex justify-around items-center p-2">
            <a href="index.html" class="flex flex-col items-center gap-1 w-20 py-1 text-primary">
                <span class="text-xs font-medium">Главная</span>
            </a>
            <a href="history.html" class="flex flex-col items-center gap-1 w-20 py-1 text-slate-500 hover:text-white">
                <span class="text-xs font-medium">История</span>
            </a>
            <a href="settings.html" class="flex flex-col items-center gap-1 w-20 py-1 text-slate-500 hover:text-white">
                <span class="text-xs font-medium">Настройки</span>
            </a>
        </div>
    </nav>

    <!-- Модалка (сокращенная для примера) -->
    <div id="transaction-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-end">
        <div class="bg-card w-full rounded-t-3xl p-6 pb-20">
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-center">Добавить</h2>
            <input type="number" id="amount-input" class="w-full bg-cardHover rounded-xl px-4 py-4 text-3xl font-bold text-white text-center mb-4" placeholder="Сумма">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-700 rounded-xl px-4 py-4">Отмена</button>
                <button onclick="submitTransaction()" class="flex-1 bg-emerald-600 rounded-xl px-4 py-4">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Загрузка состояния из кэша
        let state = JSON.parse(localStorage.getItem('financeState')) || { balanceUSD: 0, currency: 'USD', rates: { USD: 1, RUB: 92.5 }, transactions: [] };
        let currentType = 'income';
        const symbols = { USD: '$', RUB: '₽', EUR: '€', CNY: '¥', GBP: '£' };

        function updateUI() {
            const rate = state.rates[state.currency] || 1;
            const converted = state.balanceUSD * rate;
            document.getElementById('balance-display').textContent = `${converted.toFixed(2)} ${symbols[state.currency]}`;
            localStorage.setItem('financeState', JSON.stringify(state));
        }

        function addTransaction(type) { currentType = type; document.getElementById('transaction-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('transaction-modal').classList.add('hidden'); }

        function submitTransaction() {
            const amount = parseFloat(document.getElementById('amount-input').value);
            if (!amount) return;

            const rate = state.rates[state.currency] || 1;
            const amountUSD = amount / rate;

            state.balanceUSD += (currentType === 'income' ? amountUSD : -amountUSD);
            state.transactions.push({ type: currentType, amountUSD, date: new Date().toLocaleDateString() });
            
            updateUI();
            closeModal();
            tg.sendData(JSON.stringify({ action: 'add', amount, type: currentType }));
        }

        window.onload = updateUI;
    </script>
</body>
</html>
